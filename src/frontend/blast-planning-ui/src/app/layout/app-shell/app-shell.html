<mat-toolbar class="topbar">
  <div class="brand">
    <span class="title">Blast Planning Reference</span>
    <span class="subtitle">Event Sourcing • CQRS • Azure</span>
  </div>
</mat-toolbar>

<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/blast-plans/create" routerLinkActive="active">
        <mat-icon>add_circle</mat-icon>
        <span>Create Blast Plan</span>
      </a>

      <a mat-list-item routerLink="/blast-plans/search" routerLinkActive="active">
        <mat-icon>search</mat-icon>
        <span>Lookup Blast Plan</span>
      </a>

      <a mat-list-item routerLink="/about" routerLinkActive="active">
        <mat-icon>info</mat-icon>
        <span>About</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
