<mat-toolbar class="topbar">

  <div class="brand">
    <span class="title">Blast Planning Reference</span>
    <span class="subtitle">Event Sourcing • CQRS • Azure</span>
  </div>

  <span class="toolbar-spacer"></span>

  @if (isAuthenticated()) {

    <div class="user-menu">

      <div class="user-details">
        <div class="user-name">{{ userName }}</div>
        <div class="user-email">{{ userEmail }}</div>
      </div>

      <button
          mat-icon-button
          color="primary"
          (click)="logout()"
          matTooltip="Sign out">

        <mat-icon>logout</mat-icon>

      </button>

    </div>

  } @else {

    <button mat-raised-button
            color="primary"
            class="auth-button"
            (click)="login()">
      <mat-icon>login</mat-icon>
      Login
    </button>

  }

</mat-toolbar>

<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/blast-plans/create" routerLinkActive="active">
        <mat-icon>add_circle</mat-icon>
        <span>Create Blast Plan</span>
      </a>

      <a
        mat-list-item
        (click)="openBlastPlanList()">
        <mat-icon matListItemIcon>view_list</mat-icon>
        <span matListItemTitle>List Blast Plans</span>
      </a>

      <a mat-list-item routerLink="/blast-plans/search" routerLinkActive="active">
        <mat-icon>search</mat-icon>
        <span>Lookup Blast Plan</span>
      </a>

      <a mat-list-item routerLink="/about" routerLinkActive="active">
        <mat-icon>info</mat-icon>
        <span>About</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
