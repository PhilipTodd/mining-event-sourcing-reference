<section class="page">
  <header class="page-header">
    <h1>Create Blast Plan</h1>
    <p>Submit a command to the secured API and create a new event stream.</p>
  </header>

  <mat-card>
    <mat-card-header>
      <mat-card-title>New Blast Plan</mat-card-title>
      <mat-card-subtitle>Creates a BlastPlanCreated domain event</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="create()" class="form">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" placeholder="North Pit Pattern A" />

          <!-- <mat-error *ngIf="form.controls.name.hasError('required')">
            Name is required
          </mat-error> -->
          @if (form.controls.name.hasError('required')) {
             <mat-error>Name is required</mat-error>
          }

        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Site ID</mat-label>
          <input matInput formControlName="siteId" placeholder="site-001" />
          
          @if (form.controls.name.hasError('required')) {
             <mat-error>Site ID is required</mat-error>
          }
          <!-- <mat-error *ngIf="form.controls.siteId.hasError('required')">
            Site ID is required
          </mat-error> -->
          
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button
                  color="primary"
                  type="submit"
                  [disabled]="isSubmitting">
            Create Blast Plan
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
