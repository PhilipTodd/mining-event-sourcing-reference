trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - tests/**
      - infra/pipelines/deploy-app-dev.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - tests/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  azureServiceConnection: 'sc-esr-dev'

  apiProject: 'src/backend/services/blast-planning/BlastPlanning.Api/BlastPlanning.Api.csproj'
  workerProject: 'src/backend/workers/BlastPlanning.ProjectionWorker/BlastPlanning.ProjectionWorker.csproj'

  apiAppName: 'esr-dev-api'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build, test, and publish'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restore'
            inputs:
              command: 'restore'
              projects: '**/**/*.slnx'

          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: '**/**/*.slnx'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run unit tests'
            inputs:
              command: 'test'
              projects: |
                tests/BlastPlanning.Domain.Tests/*.csproj
                tests/BlastPlanning.Application.Tests/*.csproj
              arguments: '--configuration $(buildConfiguration) --no-build --logger trx'
              publishTestResults: true

          - task: DotNetCoreCLI@2
            displayName: 'Publish API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(apiProject)'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api-temp'
              zipAfterPublish: false

          - task: DotNetCoreCLI@2
            displayName: 'Publish Projection Worker'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(workerProject)'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/worker-temp'
              zipAfterPublish: false

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/api-temp/App_Data/jobs/continuous/BlastPlanning.ProjectionWorker
              cp -r $(Build.ArtifactStagingDirectory)/worker-temp/* $(Build.ArtifactStagingDirectory)/api-temp/App_Data/jobs/continuous/BlastPlanning.ProjectionWorker/
              cd $(Build.ArtifactStagingDirectory)/api-temp
              zip -r ../api-with-webjob.zip .
            displayName: 'Package API with continuous WebJob'

          - publish: '$(Build.ArtifactStagingDirectory)/api-with-webjob.zip'
            displayName: 'Publish deployment artifact'
            artifact: 'drop'

  - stage: Deploy
    displayName: 'Deploy to Dev'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDevApps
        displayName: 'Deploy API with WebJob'
        environment: 'esr-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: 'drop'

                - task: AzureWebApp@1
                  displayName: 'Deploy API with Projection Worker WebJob'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(apiAppName)'
                    package: '$(Pipeline.Workspace)/drop/api-with-webjob.zip'
                    deploymentMethod: 'zipDeploy'