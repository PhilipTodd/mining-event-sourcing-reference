trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/bicep/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'sc-esr-dev'
  resourceGroupName: 'rg-esr-dev-platform'
  location: 'australiaeast'
  templateFile: 'infra/bicep/environments/dev/main.bicep'
  parametersFile: 'infra/bicep/environments/dev/main.dev.bicepparam'

stages:
  - stage: Validate
    displayName: 'Validate Infrastructure'
    jobs:
      - job: Validate
        displayName: 'Build and validate Bicep'
        steps:
          - task: AzureCLI@2
            displayName: 'Bicep build'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep build --file $(templateFile)

          - task: AzureCLI@2
            displayName: 'ARM validation'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group validate \
                  --resource-group $(resourceGroupName) \
                  --template-file $(templateFile) \
                  --parameters $(parametersFile) 
            env:    
              SQL_ADMIN_PASSWORD: $(SqlAdministratorLoginPassword) # Maps the secret variable to an env variable

  - stage: WhatIf
    displayName: 'What-If'
    dependsOn: Validate
    jobs:
      - job: WhatIf
        displayName: 'Preview infrastructure changes'
        steps:
          - task: AzureCLI@2
            displayName: 'Run what-if'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group what-if \
                  --resource-group $(resourceGroupName) \
                  --template-file $(templateFile) \
                  --parameters $(parametersFile) 
            env:    
              SQL_ADMIN_PASSWORD: $(SqlAdministratorLoginPassword) # Maps the secret variable to an env variable

  - stage: Deploy
    displayName: 'Deploy Infrastructure'
    dependsOn: WhatIf
    condition: succeeded()
    jobs:
      - deployment: DeployDevInfrastructure
        displayName: 'Deploy dev infrastructure'
        environment: 'esr-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: AzureCLI@2
                  displayName: 'Deploy Bicep'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az deployment group create \
                        --name deploy-esr-dev-infra-$(Build.BuildId) \
                        --resource-group $(resourceGroupName) \
                        --template-file $(templateFile) \
                        --parameters $(parametersFile) 
                  env:    
                    SQL_ADMIN_PASSWORD: $(SqlAdministratorLoginPassword) # Maps the secret variable to an env variable
